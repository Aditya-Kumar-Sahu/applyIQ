x-backend-develop: &backend-develop
  watch:
    - action: sync
      path: ./backend/app
      target: /app/app
      ignore:
        - __pycache__/
        - "*.pyc"
    - action: sync
      path: ./backend/alembic
      target: /app/alembic
      ignore:
        - __pycache__/
        - "*.pyc"
    - action: rebuild
      path: ./backend/requirements.txt
    - action: rebuild
      path: ./backend/Dockerfile
    - action: rebuild
      path: ./backend/Dockerfile.worker

x-frontend-develop: &frontend-develop
  watch:
    - action: sync
      path: ./frontend/src
      target: /app/src
    - action: sync
      path: ./frontend/index.html
      target: /app/index.html
    - action: sync
      path: ./frontend/docker-entrypoint.sh
      target: /app/docker-entrypoint.sh
    - action: rebuild
      path: ./frontend/package.json
    - action: rebuild
      path: ./frontend/package-lock.json
    - action: rebuild
      path: ./frontend/Dockerfile

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      LOG_FILE_NAME: backend.log
      PLAYWRIGHT_ENABLED: "true"
      AUTO_APPLY_DEMO_MODE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    develop: *backend-develop
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      LOG_FILE_NAME: worker.log
      PLAYWRIGHT_ENABLED: "true"
      AUTO_APPLY_DEMO_MODE: "false"
    command: celery -A app.worker:celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    develop: *backend-develop
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      LOG_FILE_NAME: beat.log
      CELERY_BEAT_SCHEDULE_FILENAME: /tmp/celerybeat-schedule
      PLAYWRIGHT_ENABLED: "true"
      AUTO_APPLY_DEMO_MODE: "false"
    command: celery -A app.worker:celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    volumes:
      - ./backend:/app
    develop: *backend-develop
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 3000
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    develop: *frontend-develop
    depends_on:
      backend:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-applyiq}
      POSTGRES_USER: ${POSTGRES_USER:-applyiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyiq -d applyiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
