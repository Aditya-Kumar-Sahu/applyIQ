name: Frontend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type check and Build
      run: npm run build

  e2e-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Start E2E Environment
      run: |
        docker compose -f docker-compose.e2e.yml up -d
        docker compose -f docker-compose.e2e.yml ps

    - name: Wait for Health Checks
      run: |
        # Simple wait for backend to be ready
        for i in {1..30}; do
          if docker compose -f docker-compose.e2e.yml exec -T backend-test curl -s http://localhost:8000/health | grep "ok"; then
            echo "Backend is ready!"
            break
          fi
          echo "Waiting for backend... $i"
          sleep 5
        done

    - name: Run E2E Tests
      run: |
        docker compose -f docker-compose.e2e.yml exec -T e2e npx playwright test

    - name: Upload Playwright Report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

    - name: Stop E2E Environment
      if: always()
      run: docker compose -f docker-compose.e2e.yml down
